<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WMATA Live Board</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header id="topbar">
    <h1>METRO <span>live board</span></h1>
    <div id="status">
      <span id="train-count">— trains</span>
      <span id="clock">--:--:--</span>
      <span id="conn" class="ok">connected</span>
    </div>
  </header>

  <div id="newsbar">
    <span class="news-label">NEWS</span>
    <div id="news-scroll"><span class="news-item">Loading…</span></div>
  </div>

  <main>
    <section id="map-section">
      <svg id="map" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <filter id="train-glow" x="-60%" y="-60%" width="220%" height="220%">
            <feGaussianBlur stdDeviation="2.4" result="blur" />
            <feMerge>
              <feMergeNode in="blur" />
              <feMergeNode in="SourceGraphic" />
            </feMerge>
          </filter>
        </defs>
        <g id="links-layer"></g>
        <g id="tracks-layer"></g>
        <g id="stations-layer"></g>
        <g id="trains-layer" filter="url(#train-glow)"></g>
      </svg>
    </section>

    <section id="boards-section">
      <div id="boards-hint">Click a station on the map to see its arrivals. Pin to keep multiple boards.</div>
      <div id="boards-grid"></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
